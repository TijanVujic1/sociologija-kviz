<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sociologija Kviz</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Ikone -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="background"></div>

    <div class="container">
      <!-- Začetni zaslon -->
      <div class="start-screen" id="startScreen">
        <div class="logo">
          <i class="fa-solid fa-graduation-cap"></i>
        </div>

        <h1>Sociologija Kviz</h1>

        <p class="subtitle">
          Utrdi svoje znanje sociologije s pomočjo interaktivnega kviza.
        </p>

        <div class="game-modes">
          <button class="mode-btn" id="mistakesBtn">
            <i class="fa-solid fa-rotate-left"></i>
            Ponavljaj napake
            <span>Vprašanja, kjer si se zmotil</span>
          </button>

          <button class="mode-btn" id="favoritesModeBtn">
            <i class="fa-solid fa-star"></i>
            Označena vprašanja
            <span>Ponovi težka vprašanja</span>
          </button>

          <button class="mode-btn" id="studyModeBtn">
            <i class="fa-solid fa-book"></i>
            Učni način
            <span>Razlaga po vsakem vprašanju</span>
          </button>

          <button class="mode-btn" id="examModeBtn">
            <i class="fa-solid fa-file-pen"></i>
            Izpitni način
            <span>30 naključnih vprašanj</span>
          </button>
        </div>

        <div class="category-selection">
          <h2>Izberi kategorije</h2>

          <div class="categories">
            <label class="category">
              <input type="checkbox" value="osnove" checked />
              <span>Osnove</span>
            </label>

            <label class="category">
              <input type="checkbox" value="socializacija" checked />
              <span>Socializacija</span>
            </label>

            <label class="category">
              <input type="checkbox" value="teorije" checked />
              <span>Teorije</span>
            </label>

            <label class="category">
              <input type="checkbox" value="mediji" checked />
              <span>Mediji</span>
            </label>

            <label class="category">
              <input type="checkbox" value="globalizacija" checked />
              <span>Globalizacija</span>
            </label>

            <label class="category">
              <input type="checkbox" value="totalne" checked />
              <span>Totalne institucije</span>
            </label>

            <label class="category">
              <input type="checkbox" value="birokracija" checked />
              <span>Birokracija</span>
            </label>
          </div>
        </div>

        <button class="start-btn" id="startBtn">Začni kviz</button>
      </div>

      <!-- Glavni kviz -->
      <div class="quiz-screen hidden" id="quizScreen">
        <div class="quiz-header">
          <div class="quiz-info">
            <div class="info-box">
              <span>Vprašanje</span>
              <strong id="questionCounter"> 1 / 30 </strong>
            </div>

            <div class="info-box">
              <span>Točke</span>
              <strong id="score"> 0 </strong>
            </div>

            <div class="info-box">
              <span>Kategorija</span>
              <strong id="categoryName"> Osnove </strong>
            </div>
          </div>

          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
        </div>

        <div class="quiz-card">
          <h2 id="question">Tukaj bo vprašanje...</h2>

          <div class="options-container" id="optionsContainer">
            <!-- JS vstavi odgovore -->
          </div>

          <div class="feedback" id="feedback"></div>

          <div class="explanation hidden" id="explanation">
            <!-- Razlaga -->
          </div>
          <div class="quiz-actions">
            <button id="quitBtn">⬅ Končaj kviz</button>
            <button id="favoriteBtn">☆ Označi vprašanje</button>
          </div>
          <button class="next-btn hidden" id="nextBtn">
            Naslednje vprašanje
          </button>
        </div>
      </div>

      <!-- Končni rezultat -->
      <div class="result-screen hidden" id="resultScreen">
        <div class="result-card">
          <div class="result-icon">
            <i class="fa-solid fa-trophy"></i>
          </div>

          <h1>Konec kviza!</h1>

          <p class="final-score" id="finalScore">0 / 30</p>

          <p class="grade" id="grade">Odlično!</p>

          <div class="result-buttons">
            <button id="restartBtn">Igraj znova</button>

            <button id="homeBtn">Domov</button>
          </div>
        </div>
      </div>
    </div>
    <!-- JavaScript -->
    <script src="socquestions.js"></script>
    <script src="script.js"></script>
  </body>
</html>
